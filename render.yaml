services:
  - type: web
    name: indapmuni-api
    env: python
    language: python
    region: oregon
    plan: free
    pythonVersion: "3.11"
    buildCommand: echo "Dependencies will be installed during start"
    startCommand: bash build.sh
    envVars:
      - key: DEBUG
        value: "false"
      - key: SECRET_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: ALLOWED_HOSTS
        value: ".onrender.com,localhost,127.0.0.1"
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: CSRF_TRUSTED_ORIGINS
        sync: false
